<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SHAPE — The Inch Loss Secret</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#050505;--s1:#0A0A08;--s2:#111110;--s3:#1A1A16;--s4:#222220;
--gold:#D4A843;--goldL:#E8C96A;--goldD:#B8922E;--goldDim:rgba(212,168,67,.10);--goldMid:rgba(212,168,67,.22);
--text:#F0EDE4;--sub:#9A9488;--muted:#5E5A50;
--bdr:#1E1D18;--bdr2:#2A2920;
--red:#E05545;--green:#45C98A;--blue:#4598C9;--orange:#E0A045;--purple:#9A68D4;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
::selection{background:var(--goldMid);color:var(--text)}
.page{max-width:800px;margin:0 auto;padding:20px 16px 100px}
.card{background:var(--s2);border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid var(--bdr);transition:border-color .2s}
.card:hover{border-color:var(--bdr2)}
.card-glow:hover{border-color:var(--goldD)}
.label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;display:block;font-weight:600}
.inp{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--bdr);background:var(--s1);color:var(--text);font-size:13px;outline:none;transition:border .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted)}
.sel{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--bdr);background:var(--s1);color:var(--text);font-size:13px;outline:none;appearance:none;transition:border .2s}
.sel:focus{border-color:var(--gold)}
.btn{padding:12px 26px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--goldD),var(--gold));color:var(--bg);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,168,67,.25)}
.btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn-o{padding:7px 16px;border-radius:10px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-o:hover{background:var(--goldDim)}
.btn-r{border-color:var(--red);color:var(--red)}.btn-r:hover{background:rgba(224,85,69,.08)}
.btn-g{border-color:var(--green);color:var(--green)}.btn-g:hover{background:rgba(69,201,138,.08)}
.chip{padding:6px 14px;border-radius:24px;border:1px solid var(--bdr);background:transparent;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.chip.on{border-color:var(--gold);background:var(--goldDim);color:var(--goldL)}
.chip:hover{border-color:var(--goldD)}
.chip-s{padding:4px 9px;font-size:10px}
.tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.row{display:flex;justify-content:space-between;align-items:center}
.flex{display:flex}.gap{gap:6px}.gap2{gap:10px}.wrap{flex-wrap:wrap}.items-c{align-items:center}
.sec{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px;letter-spacing:.5px}
.fd{font-family:'Cormorant Garamond',serif}
.mb{margin-bottom:10px}.mb2{margin-bottom:16px}.mt{margin-top:12px}.w100{width:100%}.tac{text-align:center}
.field{margin-bottom:12px}
.divider{height:1px;background:var(--bdr);margin:12px 0}
.stat-card{background:var(--s1);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--bdr)}
.table{width:100%;border-collapse:collapse;font-size:11px}
.table th{padding:8px 6px;border-bottom:1px solid var(--bdr);font-size:9px;letter-spacing:1.5px;color:var(--muted);text-align:left;text-transform:uppercase}
.table td{padding:7px 6px;border-bottom:1px solid var(--bdr)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--goldD),var(--gold));color:var(--bg);padding:12px 28px;border-radius:12px;font-size:13px;font-weight:700;z-index:999;animation:ti .35s ease;box-shadow:0 8px 30px rgba(212,168,67,.3)}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}
.gold-line{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px 0;opacity:.3}
@media(max-width:520px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}.hide-m{display:none !important}}
</style>
</head>

// ── MACROS CALC ──
function calcMacros(cl){
  if(cl.macroMode==="manual"&&cl.manualCal)return{cal:+cl.manualCal,p:+cl.manualP,c:+cl.manualC,f:+cl.manualF};
  const w=+cl.weight,h=+cl.height,a=+cl.age;if(!w||!h||!a)return null;
  const bmr=cl.gender==="male"?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;
  const af={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};
  const tdee=Math.round(bmr*(af[cl.activity]||1.55));
  const mult={weight_loss:.80,fat_loss:.75,muscle_gain:1.15};
  const cal=Math.round(tdee*(mult[cl.goal]||1));
  const sp={weight_loss:[.35,.35,.30],fat_loss:[.40,.30,.30],muscle_gain:[.30,.45,.25]};
  const[pr,cr,fr]=sp[cl.goal]||[.30,.40,.30];
  return{cal,p:Math.round(cal*pr/4),c:Math.round(cal*cr/4),f:Math.round(cal*fr/9),tdee};
}

function filteredFoods(cl){
  const af=allFoods();const allowed=new Set(cl.allowedFoods||[]);
  return af.filter(f=>{
    if(allowed.size>0&&!allowed.has(f.id))return false;
    if(cl.dietType==="veg"&&!f.veg)return false;
    if(cl.dietType==="egg"&&!f.veg&&!f.name.includes("Egg"))return false;
    return true;
  });
}

// ── PLAN GENERATION ──
function generatePlan(cl){
  const macros=calcMacros(cl);if(!macros)return null;
  const pool=filteredFoods(cl);
  const meals=(cl.activeMeals||MEAL_SLOTS.slice(0,5)).map(mn=>{
    const items=[];const used=new Set();
    const pick=(cats,n)=>{
      const a=pool.filter(f=>cats.includes(f.cat)&&!used.has(f.id));
      const s=[...a].sort(()=>Math.random()-.5);return s.slice(0,n);
    };
    let picks=[];
    if(mn==="Early Morning"||mn==="Post Dinner")picks=[...pick(["beverage"],1),...pick(["fat"],1)];
    else if(mn==="Breakfast")picks=[...pick(["grain"],1),...pick(["protein"],1),...pick(["fruit"],1)];
    else if(mn==="Lunch"||mn==="Dinner")picks=[...pick(["grain"],1),...pick(["protein"],1),...pick(["vegetable"],1),...pick(["fat"],1)];
    else picks=[...pick(["protein","fruit","fat","custom"],2)];
    picks.forEach(f=>used.add(f.id));
    if(picks.length){
      const calPer=macros.cal/(cl.activeMeals||MEAL_SLOTS.slice(0,5)).length;
      const baseCal=picks.reduce((s,f)=>s+f.cal,0);
      const sc=baseCal>0?calPer/baseCal:1;
      picks.forEach(f=>items.push({...f,qty:Math.max(.25,Math.round(sc*4)/4)}));
    }
    return{name:mn,items};
  });
  return{meals,macros,generatedAt:new Date().toISOString()};
}

const $=id=>document.getElementById(id);
const app=()=>document.getElementById("app");

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="onclick"||k==="oninput"||k==="onchange")el[k]=v;
    else if(k==="className")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="innerHTML")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat(9).forEach(ch=>{
    if(ch==null||ch===false)return;
    el.appendChild(typeof ch==="string"||typeof ch==="number"?document.createTextNode(ch):ch);
  });
  return el;
}

function render(){
  const root=app();root.innerHTML="";
  root.appendChild(screens[state.screen]?screens[state.screen]():screens.roster());
  if(state.toast)root.appendChild(h("div",{className:"toast"},state.toast));

  const cd=Math.round(tot.cal)-(target?target.cal:0);

      target?h("span",{style:{fontSize:"12px",color:dc,marginLeft:"6px",fontWeight:"700"}},"("+(cd>0?"+":"")+cd+")"):null
    ),

      )
    )
  );
}

          h("div",{style:{fontSize:"10px",color:"var(--muted)",marginTop:"5px"}},cl.dietType==="veg"?"🟢 Veg":cl.dietType==="egg"?"🟡 Egg":"🔴 Non-Veg"),
          h("div",{style:{fontSize:"10px",color:"var(--muted)"}},cl.qtyMode==="raw"?"📏 Raw":"🍽 Cooked")
        )
      ),
      macros?h("div",{style:{display:"flex",justifyContent:"space-around",marginTop:"14px",paddingTop:"14px",borderTop:"1px solid var(--bdr)",textAlign:"center"}},
        ...[{l:"KCAL",v:macros.cal,c:"var(--gold)"},{l:"PROTEIN",v:macros.p+"g",c:"var(--blue)"},{l:"CARBS",v:macros.c+"g",c:"var(--orange)"},{l:"FAT",v:macros.f+"g",c:"var(--red)"}].map(m=>
          h("div",null,h("div",{style:{fontSize:"18px",fontWeight:"800",color:m.c}},m.v),h("div",{style:{fontSize:"9px",color:"var(--muted)",letterSpacing:"1px"}},m.l))
        )
      ):null
    ),

    // Quick stats
    last?h("div",{className:"g3 mb"},
      StatCard("CURRENT WT",last.weight+"kg",ci.length>1?(+last.weight-(+first.weight)).toFixed(1):undefined,ci.length>1?(+last.weight<+first.weight?"var(--green)":"var(--red)"):undefined),
      StatCard("WAIST",(last.waist||"—")+'"',ci.length>1&&last.waist&&first.waist?(+last.waist-(+first.waist)).toFixed(1):undefined,ci.length>1&&last.waist&&first.waist?(+last.waist<+first.waist?"var(--green)":"var(--red)"):undefined),
      StatCard("CHECK-INS",ci.length+"","","")
    ):null,

    // Action grid
    h("div",{className:"g2 mb"},
      ...[
        ["🍽 Diet Plan",state.currentPlan?()=>setState({screen:"diet_result"}):null,state.currentPlan?"View Plan":"No plan yet"],
        ["🆕 Generate Diet",()=>setState({screen:"diet_prefs"}),"Create / Regenerate"],
        ["📋 Check-In",()=>{state.ciForm={date:new Date().toISOString().split("T")[0],weight:"",chest:"",waist:"",hip:"",arm:"",thigh:"",bodyFat:"",note:""};setState({screen:"checkin_form"});},"Log Measurements"],
        ["📊 Dashboard",ci.length>0?()=>setState({screen:"dashboard"}):null,ci.length>0?"View Progress":"No data yet"],
      ].map(([title,action,sub])=>
        h("div",{className:"card",style:{cursor:action?"pointer":"default",opacity:action?1:.4,textAlign:"center",padding:"22px 12px"},onclick:action||undefined},
          h("div",{style:{fontSize:"16px",marginBottom:"4px"}},title),
          h("div",{style:{fontSize:"10px",color:"var(--sub)"}},sub)
        )
      )
    ),

    h("div",{className:"flex gap2 mt"},
      h("button",{className:"btn-o",onclick:()=>setState({cf:{...cl},screen:"client_form"})},"✏️ Edit"),
      h("button",{className:"btn-o btn-r",onclick:()=>{
        if(!confirm("Delete "+cl.name+" and all their data?"))return;
        state.clients=state.clients.filter(c=>c.id!==cl.id);saveClients();LS.del("plan_"+cl.id);LS.del("ci_"+cl.id);
        toast("Client deleted");setState({screen:"roster"});
      }},"🗑 Delete")
    )
  );
};

// ── DIET PREFS ──
screens.diet_prefs=()=>{
  const cl=getClient(state.activeId);if(!cl)return screens.roster();
  const allowed=new Set(cl.allowedFoods||[]);
  const af=allFoods();
  const filtered=af.filter(f=>{
    if(cl.dietType==="veg"&&!f.veg)return false;
    if(cl.dietType==="egg"&&!f.veg&&!f.name.includes("Egg"))return false;
    return true;
  });
  const isEmpty=allowed.size===0;

  const toggleF=(fid)=>{
    if(isEmpty){const all=new Set(af.map(f=>f.id));all.delete(fid);cl.allowedFoods=[...all];}
    else{const n=new Set(allowed);n.has(fid)?n.delete(fid):n.add(fid);cl.allowedFoods=[...n];}
    const i=state.clients.findIndex(c=>c.id===cl.id);state.clients[i]=cl;saveClients();render();
  };

  const toggleCat=(catK)=>{
    const ids=filtered.filter(f=>f.cat===catK).map(f=>f.id);
    if(isEmpty){const all=new Set(af.map(f=>f.id));ids.forEach(id=>all.delete(id));cl.allowedFoods=[...all];}
    else{const allOn=ids.every(id=>allowed.has(id));const n=new Set(allowed);ids.forEach(id=>allOn?n.delete(id):n.add(id));cl.allowedFoods=[...n];}
    const i=state.clients.findIndex(c=>c.id===cl.id);state.clients[i]=cl;saveClients();render();
  };

  const toggleMeal=(m)=>{
    cl.activeMeals=cl.activeMeals.includes(m)?cl.activeMeals.filter(x=>x!==m):[...cl.activeMeals,m];
    const i=state.clients.findIndex(c=>c.id===cl.id);state.clients[i]=cl;saveClients();render();
  };

  return h("div",{className:"page fade-in"},
    Logo(cl.name+" — Food Preferences"),
    Nav([["← Back",()=>setState({screen:"client_detail"})]]),

    h("div",{className:"card"},h("div",{className:"sec"},"🕐 Active Meals"),
      h("div",{className:"flex gap wrap"},...MEAL_SLOTS.map(m=>Chip(m,cl.activeMeals.includes(m),()=>toggleMeal(m))))
    ),

    ...CATS.map(cat=>{
      const items=filtered.filter(f=>f.cat===cat.k);
      if(!items.length&&cat.k!=="custom")return null;
      const allOn=items.length>0&&items.every(f=>isEmpty||allowed.has(f.id));
      return h("div",{className:"card"},
        h("div",{className:"row mb"},
          h("div",{className:"sec"},cat.e+" "+cat.l),
          items.length>0?h("button",{className:"chip chip-s"+(allOn?" on":""),onclick:()=>toggleCat(cat.k)},allOn?"Deselect All":"Select All"):null
        ),
        h("div",{className:"flex gap wrap"},
          ...items.map(f=>h("button",{className:"chip chip-s"+((isEmpty||allowed.has(f.id))?" on":""),onclick:()=>toggleF(f.id)},f.name+" ",h("span",{style:{opacity:".5"}},f.cal+"cal")))
        ),
        cat.k==="custom"?h("button",{className:"btn-o mt",onclick:()=>{state.showAddFood=true;render();}},"+  Add Custom Recipe"):null
      );
    }).filter(Boolean),

    state.showAddFood?h("div",{className:"card",style:{border:"1px solid var(--gold)"}},
      h("div",{className:"sec"},"👨‍🍳 New Custom Recipe"),
      Field("Recipe Name",state.foodForm.name,v=>{state.foodForm.name=v;render();},{ph:"Mom's Dal Khichdi"}),
      h("div",{className:"g2"},
        Field("Raw Qty",state.foodForm.raw,v=>{state.foodForm.raw=v;render();},{ph:"80g rice+30g dal"}),
        Field("Cooked Qty",state.foodForm.cooked,v=>{state.foodForm.cooked=v;render();},{ph:"1 bowl (250g)"})
      ),
      h("div",{className:"g2"},
        Field("Calories",state.foodForm.cal,v=>{state.foodForm.cal=v;render();},{type:"number",ph:"280"}),
        Field("Protein",state.foodForm.p,v=>{state.foodForm.p=v;render();},{type:"number",ph:"10"})
      ),
      h("div",{className:"g2"},
        Field("Carbs",state.foodForm.c,v=>{state.foodForm.c=v;render();},{type:"number",ph:"45"}),
        Field("Fat",state.foodForm.f,v=>{state.foodForm.f=v;render();},{type:"number",ph:"5"})
      ),
      h("div",{className:"flex gap mt"},
        h("button",{className:"btn",onclick:()=>{
          const ff=state.foodForm;if(!ff.name||!ff.cal)return;
          const item={id:"cust_"+Date.now(),name:ff.name,raw:ff.raw||ff.name,cooked:ff.cooked||ff.name,cal:+ff.cal,p:+ff.p||0,c:+ff.c||0,f:+ff.f||0,cat:"custom",veg:ff.veg?1:0};
          state.customFoods.push(item);saveCustomFoods();
          state.foodForm={name:"",raw:"",cooked:"",cal:"",p:"",c:"",f:"",veg:1};state.showAddFood=false;
          toast("✅ Recipe added!");render();
        }},"Save Recipe"),
        h("button",{className:"btn-o btn-r",onclick:()=>{state.showAddFood=false;render();}},"Cancel")
      )
    ):null,

    h("button",{className:"btn w100 mt",onclick:()=>{
      const plan=generatePlan(cl);if(!plan)return toast("❌ Fill weight/height/age first");
      state.currentPlan=plan;savePlan(cl.id,plan);toast("✅ Diet plan generated!");setState({screen:"diet_result"});
    }},"Generate Diet Plan →")
  );
};

// ── DIET RESULT ──
screens.diet_result=()=>{
  const cl=getClient(state.activeId);const plan=state.currentPlan;
  if(!cl||!plan)return screens.roster();
  const tot=plan.meals.reduce((a,m)=>{m.items.forEach(it=>{a.cal+=it.cal*it.qty;a.p+=it.p*it.qty;a.c+=it.c*it.qty;a.f+=it.f*it.qty});return a},{cal:0,p:0,c:0,f:0});

  return h("div",{className:"page fade-in"},
    h("div",{className:"row mb2"},
      h("div",null,
        h("img",{src:LOGO_B64,style:{height:"32px"}}),
        h("div",{style:{fontSize:"10px",color:"var(--muted)"}},cl.name+" — Diet Plan")
      ),
      h("div",{className:"flex gap wrap"},
        h("button",{className:"btn-o",onclick:()=>setState({screen:"client_detail"})},"← Back"),
        h("button",{className:"btn-o",onclick:()=>{
          const p=generatePlan(cl);state.currentPlan=p;savePlan(cl.id,p);toast("🔀 Shuffled!");render();
        }},"↻ Shuffle"),
        h("button",{className:"btn-o btn-g",onclick:()=>{
          const cur=plan.meals.reduce((s,m)=>s+m.items.reduce((s2,it)=>s2+it.cal*it.qty,0),0);
          if(cur===0)return;const r=plan.macros.cal/cur;
          plan.meals.forEach(m=>m.items.forEach(it=>{it.qty=Math.max(.25,Math.round(it.qty*r*4)/4)}));
          state.currentPlan={...plan};savePlan(cl.id,state.currentPlan);toast("⚖️ Balanced!");render();
        }},"⚖ Balance")
      )
    ),
    MacroBar(tot,plan.macros),

    ...plan.meals.map((meal,mi)=>{
      const mt=meal.items.reduce((a,it)=>({cal:a.cal+it.cal*it.qty,p:a.p+it.p*it.qty,c:a.c+it.c*it.qty,f:a.f+it.f*it.qty}),{cal:0,p:0,c:0,f:0});
      return h("div",{className:"card"},
        h("div",{className:"row mb"},
          h("div",{className:"fd",style:{fontSize:"16px",fontWeight:"600"}},meal.name),
          Tag(Math.round(mt.cal)+" kcal","var(--gold)")
        ),
        ...meal.items.map((it,ii)=>
          h("div",{style:{padding:"9px 0",borderBottom:"1px solid var(--bdr)"}},
            h("div",{className:"row"},
              h("div",{style:{flex:"1"}},
                h("div",{style:{fontSize:"13px",fontWeight:"600"}},it.name),
                h("div",{style:{fontSize:"10px",color:"var(--sub)"}},
                  it.qty===1?(cl.qtyMode==="raw"?it.raw:it.cooked):it.qty+" × "+(cl.qtyMode==="raw"?it.raw:it.cooked)
                )
              ),
              h("div",{className:"flex gap",style:{fontSize:"10px",color:"var(--muted)"}},
                h("span",null,h("b",{style:{color:"var(--text)"}},Math.round(it.cal*it.qty)),"cal"),
                h("span",{className:"hide-m"},h("b",{style:{color:"var(--blue)"}},Math.round(it.p*it.qty)+"g"),"P"),
                h("span",{className:"hide-m"},h("b",{style:{color:"var(--gold)"}},Math.round(it.c*it.qty)+"g"),"C"),
                h("span",{className:"hide-m"},h("b",{style:{color:"var(--red)"}},Math.round(it.f*it.qty)+"g"),"F")
              )
            ),
            h("div",{className:"flex gap",style:{marginTop:"5px"}},
              h("button",{className:"chip chip-s",onclick:()=>{it.qty=Math.max(.25,Math.round((it.qty-.25)*4)/4);state.currentPlan={...plan};savePlan(cl.id,plan);render();}},"−"),
              h("span",{style:{fontSize:"12px",fontWeight:"700",color:"var(--gold)",minWidth:"30px",textAlign:"center",lineHeight:"24px"}},it.qty),
              h("button",{className:"chip chip-s",onclick:()=>{it.qty=Math.round((it.qty+.25)*4)/4;state.currentPlan={...plan};savePlan(cl.id,plan);render();}},"+"),
              h("button",{className:"chip chip-s",onclick:()=>{
                const pool=filteredFoods(cl).filter(f=>f.cat===it.cat&&f.id!==it.id);
                if(!pool.length)return;const rep=pool[Math.floor(Math.random()*pool.length)];
                meal.items[ii]={...rep,qty:it.qty};state.currentPlan={...plan};savePlan(cl.id,plan);render();
              }},"🔄"),
              h("button",{className:"chip chip-s",style:{borderColor:"var(--red)",color:"var(--red)"},onclick:()=>{
                meal.items.splice(ii,1);state.currentPlan={...plan};savePlan(cl.id,plan);render();
              }},"✕")
            )
          )
        )
      );
    }),
    h("div",{style:{fontSize:"9px",color:"var(--muted)",textAlign:"center",padding:"16px"}},"Generated "+new Date(plan.generatedAt).toLocaleDateString("en-IN")+" · "+cl.qtyMode.toUpperCase()+" quantities")
  );
};

// ── CHECK-IN FORM ──
screens.checkin_form=()=>{
  const cl=getClient(state.activeId);if(!cl)return screens.roster();
  const ci=state.ciForm;const u=(k,v)=>{ci[k]=v;render()};

  return h("div",{className:"page fade-in"},
    Logo(cl.name+" — Weekly Check-In"),
    Nav([["← Back",()=>setState({screen:"client_detail"})]]),

    h("div",{className:"card"},
      h("div",{className:"sec"},"📋 Record Measurements"),
      Field("Date",ci.date,v=>u("date",v),{type:"date"}),
      h("div",{className:"g2"},
        Field("Weight (kg)",ci.weight,v=>u("weight",v),{type:"number",ph:"80.5"}),
        Field("Body Fat %",ci.bodyFat,v=>u("bodyFat",v),{type:"number",ph:"22"})
      ),
      h("div",{className:"g3"},
        Field("Chest (in)",ci.chest,v=>u("chest",v),{type:"number",ph:"40"}),
        Field("Waist (in)",ci.waist,v=>u("waist",v),{type:"number",ph:"33"}),
        Field("Hip (in)",ci.hip,v=>u("hip",v),{type:"number",ph:"38"})
      ),
      h("div",{className:"g2"},
        Field("Arm (in)",ci.arm,v=>u("arm",v),{type:"number",ph:"14"}),
        Field("Thigh (in)",ci.thigh,v=>u("thigh",v),{type:"number",ph:"22"})
      ),
      Field("Coach Notes",ci.note,v=>u("note",v),{ph:"Diet compliance, energy levels..."})
    ),

    h("button",{className:"btn w100",disabled:!ci.weight,onclick:()=>{

      state.checkins=[...state.checkins,entry].sort((a,b)=>a.date.localeCompare(b.date));
      saveCheckins(cl.id,state.checkins);toast("✅ Check-in saved!");setState({screen:"dashboard"});
    }},"Save Check-In →"),

    state.checkins.length>0?h("div",{className:"card mt"},
      h("div",{className:"sec"},"📜 History ("+state.checkins.length+" entries)"),
      ...[...state.checkins].reverse().slice(0,6).map(c=>
        h("div",{className:"row",style:{padding:"7px 0",borderBottom:"1px solid var(--bdr)"}},
          h("div",null,
            h("div",{style:{fontSize:"12px",fontWeight:"600"}},c.date),
            h("div",{style:{fontSize:"10px",color:"var(--sub)"}},c.weight+"kg"+(c.waist?" · W:"+c.waist+'"':""))
          ),
          h("button",{className:"btn-o btn-r",style:{padding:"4px 10px"},onclick:()=>{
            state.checkins=state.checkins.filter(x=>x.id!==c.id);saveCheckins(cl.id,state.checkins);render();
          }},"✕")
        )
      )
    ):null
  );
};

// ── DASHBOARD ──
screens.dashboard=()=>{
  const cl=getClient(state.activeId);if(!cl)return screens.roster();
  const ci=state.checkins;if(!ci.length)return setState({screen:"client_detail"});

  const data=ci.map(c=>({date:c.date,dl:c.date.slice(5),w:+c.weight||0,waist:+c.waist||0,chest:+c.chest||0,hip:+c.hip||0,arm:+c.arm||0,thigh:+c.thigh||0,bf:+c.bodyFat||0})).filter(d=>d.w);
  const first=data[0],last=data[data.length-1];
  const delta=(k)=>first[k]&&last[k]?(last[k]-first[k]).toFixed(1):"—";
  const dCol=(k)=>{const d=first[k]&&last[k]?last[k]-first[k]:0;return cl.goal==="muscle_gain"?(d>0?"var(--green)":"var(--red)"):(d<0?"var(--green)":d>0?"var(--red)":"var(--sub)")};

  // SVG chart helper
  function svgChart(title,series,height=180){
    if(!data.length)return null;
    const W=680,H=height,pad={t:20,r:20,b:30,l:45};
    const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
    const allVals=series.flatMap(s=>data.map(d=>d[s.k]).filter(v=>v>0));
    if(!allVals.length)return null;
    const mn=Math.min(...allVals)-2,mx=Math.max(...allVals)+2;
    const scX=(i)=>pad.l+(i/(data.length-1||1))*cW;
    const scY=(v)=>pad.t+cH-(((v-mn)/(mx-mn||1))*cH);

    let paths=series.map(s=>{
      const pts=data.map((d,i)=>d[s.k]>0?{x:scX(i),y:scY(d[s.k]),v:d[s.k]}:null).filter(Boolean);
      if(pts.length<2)return"";
      const pathD="M"+pts.map(p=>p.x+","+p.y).join("L");
      const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${s.c}" stroke="var(--s2)" stroke-width="2"><title>${s.l}: ${p.v}</title></circle>`).join("");
      return`<path d="${pathD}" fill="none" stroke="${s.c}" stroke-width="2.5" stroke-linecap="round"/>${dots}`;
    }).join("");

    // Grid lines
    const gridLines=Array.from({length:5},(_, i)=>{
      const v=mn+(mx-mn)*i/4;const y=scY(v);
      return`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="var(--bdr)" stroke-dasharray="4 4"/><text x="${pad.l-8}" y="${y+4}" text-anchor="end" fill="var(--muted)" font-size="10" font-family="DM Sans">${Math.round(v)}</text>`;
    }).join("");

    // X labels
    const xLabels=data.map((d,i)=>{
      if(data.length>10&&i%Math.ceil(data.length/8)!==0&&i!==data.length-1)return"";
      return`<text x="${scX(i)}" y="${H-5}" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="DM Sans">${d.dl}</text>`;
    }).join("");

    // Legend
    const legend=series.map((s,i)=>`<text x="${pad.l+i*90}" y="14" fill="${s.c}" font-size="10" font-weight="600" font-family="DM Sans">● ${s.l}</text>`).join("");

    return h("div",{className:"card"},
      h("div",{className:"sec"},title),
      h("div",{style:{overflowX:"auto"},innerHTML:`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${gridLines}${xLabels}${paths}${legend}</svg>`})
    );
  }

  return h("div",{className:"page fade-in"},
    Logo(cl.name+" — Progress Dashboard"),
    Nav([
      ["← Back",()=>setState({screen:"client_detail"})],
      ["+ Check-In",()=>{state.ciForm={date:new Date().toISOString().split("T")[0],weight:"",chest:"",waist:"",hip:"",arm:"",thigh:"",bodyFat:"",note:""};setState({screen:"checkin_form"});}]
    ]),

    // Summary
    h("div",{className:"g3 mb"},
      StatCard("WEIGHT",last.w+"kg",delta("w"),dCol("w")),
      StatCard("WAIST",(last.waist||"—")+'"',delta("waist"),dCol("waist")),
      StatCard("BODY FAT",(last.bf||"—")+"%",delta("bf"),dCol("bf"))
    ),
    h("div",{className:"g4 mb"},
      StatCard("CHEST",(last.chest||"—")+'"',delta("chest"),dCol("chest")),
      StatCard("HIP",(last.hip||"—")+'"',delta("hip"),dCol("hip")),
      StatCard("ARM",(last.arm||"—")+'"',delta("arm"),dCol("arm")),
      StatCard("THIGH",(last.thigh||"—")+'"',delta("thigh"),dCol("thigh"))
    ),

    svgChart("⚖️ Weight Trend",[{k:"w",c:"var(--gold)",l:"Weight (kg)"}]),
    svgChart("📏 Inch Loss Trend",[
      {k:"waist",c:"var(--red)",l:"Waist"},
      {k:"chest",c:"var(--blue)",l:"Chest"},
      {k:"hip",c:"var(--orange)",l:"Hip"},
      {k:"arm",c:"var(--purple)",l:"Arm"},
      {k:"thigh",c:"var(--green)",l:"Thigh"},
    ],220),
    data.some(d=>d.bf)?svgChart("🔥 Body Fat %",[{k:"bf",c:"var(--orange)",l:"Body Fat"}],160):null,

    // History table
    h("div",{className:"card"},
      h("div",{className:"sec"},"📜 All Check-Ins"),
      h("div",{style:{overflowX:"auto"},innerHTML:`
        <table class="table"><thead><tr>${["Date","Wt","Chest","Waist","Hip","Arm","Thigh","BF%","Notes"].map(h=>"<th>"+h+"</th>").join("")}</tr></thead><tbody>
        ${[...ci].reverse().map(c=>"<tr>"+[c.date,"<b>"+c.weight+"</b>",c.chest||"—",c.waist||"—",c.hip||"—",c.arm||"—",c.thigh||"—",c.bodyFat||"—","<span style='color:var(--sub);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block'>"+(c.note||"")+"</span>"].map(v=>"<td>"+v+"</td>").join("")+"</tr>").join("")}
        </tbody></table>
      `})
    ),

    h("div",{style:{fontSize:"9px",color:"var(--muted)",textAlign:"center",padding:"16px"}},"SHAPE — The Inch Loss Secret · "+ci.length+" check-ins · "+new Date().toLocaleDateString("en-IN"))
  );
};
